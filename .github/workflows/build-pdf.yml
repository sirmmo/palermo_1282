name: Build PDFs

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Google Fonts (EB Garamond, Cinzel, Cinzel Decorative)
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends git fontconfig ca-certificates
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/google/fonts.git /tmp/gfonts
          cd /tmp/gfonts
          git sparse-checkout set ofl/ebgaramond ofl/cinzel ofl/cinzeldecorative
          install -d /usr/share/fonts/truetype/google
          # Install only STATIC fonts (skip variable [wght] files) so
          # fontspec's `*-Regular`/`*-Bold`/`*-Italic`/`*-BoldItalic`
          # lookups resolve to discrete faces.
          for fam in ebgaramond cinzel cinzeldecorative; do
            dir="ofl/$fam"
            src="$dir/static"
            [ -d "$src" ] || src="$dir"
            find "$src" -maxdepth 1 -type f -name '*.ttf' ! -name '*[[]wght[]]*' \
              -exec cp {} /usr/share/fonts/truetype/google/ \;
          done
          fc-cache -fv
          echo "--- registered faces ---"
          fc-list : family style file | grep -iE 'garamond|cinzel' | sort
          for face in 'EB Garamond:style=Regular' 'EB Garamond:style=Bold' \
                      'EB Garamond:style=Italic' 'EB Garamond:style=Bold Italic' \
                      'Cinzel:style=Regular' 'Cinzel:style=Bold' \
                      'Cinzel Decorative:style=Regular' 'Cinzel Decorative:style=Bold'; do
            fc-match "$face" | grep -qiE 'garamond|cinzel' \
              || (echo "Missing face: $face"; exit 1)
          done

      - name: Build Italian manual
        working-directory: it
        run: |
          xelatex -interaction=nonstopmode -halt-on-error main_it.tex
          xelatex -interaction=nonstopmode -halt-on-error main_it.tex

      - name: Build English manual
        working-directory: en
        run: |
          xelatex -interaction=nonstopmode -halt-on-error main_en.tex
          xelatex -interaction=nonstopmode -halt-on-error main_en.tex

      - name: Build character sheets
        run: |
          xelatex -interaction=nonstopmode -halt-on-error schede_vespri.tex
          xelatex -interaction=nonstopmode -halt-on-error schede_vespri.tex

      - name: Build GM master sheet
        run: |
          xelatex -interaction=nonstopmode -halt-on-error scheda_master.tex
          xelatex -interaction=nonstopmode -halt-on-error scheda_master.tex

      - name: Collect PDFs
        run: |
          mkdir -p out
          cp it/main_it.pdf       out/vespri_1282_it.pdf
          cp en/main_en.pdf       out/vespri_1282_en.pdf
          cp schede_vespri.pdf    out/vespri_1282_schede.pdf
          cp scheda_master.pdf    out/vespri_1282_master.pdf

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: vespri-1282-pdfs
          path: out/*.pdf
          if-no-files-found: error

      - name: Attach PDFs to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.pdf

      - name: Publish to itch.io
        if: github.event_name == 'release'
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -eux
          apt-get install -y --no-install-recommends curl unzip
          curl -sSL -o /tmp/butler.zip \
            https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -o /tmp/butler.zip -d /usr/local/bin
          chmod +x /usr/local/bin/butler
          butler -V
          butler push out/vespri_1282_it.pdf     sirmmo/palermo-1282:manual-it --userversion "$TAG"
          butler push out/vespri_1282_en.pdf     sirmmo/palermo-1282:manual-en --userversion "$TAG"
          butler push out/vespri_1282_schede.pdf sirmmo/palermo-1282:sheets    --userversion "$TAG"
          butler push out/vespri_1282_master.pdf sirmmo/palermo-1282:master    --userversion "$TAG"
